<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PromptLens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: #12122a;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .sidebar.hidden {
      transform: translateX(-100%);
      position: fixed;
    }
    .sidebar-header {
      padding: 14px;
      border-bottom: 1px solid #2a2a4a;
    }
    .sidebar-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .sidebar-header h2 {
      font-size: 1rem;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .new-chat-btn {
      width: 100%;
      padding: 9px;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .search-box {
      width: 100%;
      padding: 7px 11px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.82rem;
      outline: none;
    }
    .search-box:focus { border-color: #7b61ff; }
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    .chat-group-label {
      font-size: 0.7rem;
      color: #555;
      padding: 8px 8px 3px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .chat-item {
      padding: 9px 10px;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }
    .chat-item:hover { background: #1a1a3a; }
    .chat-item.active { background: #2a2a4a; }
    .chat-item-title {
      font-size: 0.83rem;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .chat-del {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 2px 4px;
      display: none;
    }
    .chat-item:hover .chat-del { display: block; }
    .chat-del:hover { color: #ff6b6b; }
    .sidebar-footer {
      padding: 10px;
      border-top: 1px solid #2a2a4a;
      font-size: 0.7rem;
      color: #444;
      text-align: center;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      min-width: 0;
    }
    .main-header {
      padding: 11px 16px;
      border-bottom: 1px solid #2a2a4a;
      background: #12122a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: #888;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
    }
    .main-header h3 {
      font-size: 0.9rem;
      color: #888;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .msg-count {
      font-size: 0.75rem;
      color: #444;
      white-space: nowrap;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #444;
      text-align: center;
      gap: 10px;
      padding: 20px;
    }
    .welcome-screen h2 {
      font-size: 1.6rem;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-screen p { font-size: 0.88rem; color: #555; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      margin-top: 12px;
    }
    .chip {
      padding: 7px 14px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      font-size: 0.82rem;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chip:hover { border-color: #7b61ff; color: #ccc; }

    /* MESSAGES */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }
    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.7;
      font-size: 0.92rem;
      word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, #7b61ff, #5a45cc);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      max-width: 80%;
    }
    .bubble.assistant {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      color: #ccc;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      width: 100%;
    }
    .bubble.assistant strong { color: #fff; }

    /* ANALYTICS */
    .analytics-toggle {
      align-self: flex-start;
      background: none;
      border: 1px solid #7b61ff44;
      color: #7b61ff;
      padding: 4px 11px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.76rem;
      transition: all 0.2s;
    }
    .analytics-toggle:hover {
      background: #7b61ff22;
      border-color: #7b61ff;
    }
    .analytics-box {
      display: none;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 13px;
      max-width: 460px;
      font-size: 0.82rem;
    }
    .analytics-box.open { display: block; }

    /* Mismatch inside analytics */
    .mismatch-section {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid #2a2a4a;
    }
    .mismatch-ok { color: #6bcb77; }
    .mismatch-warn { color: #ff6b6b; }
    .sugg-box {
      margin-top: 6px;
      padding: 6px 8px;
      background: #2a1a1a;
      border-radius: 6px;
      color: #ffaaaa;
      font-size: 0.79rem;
    }

    /* Literacy */
    .lit-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: #888;
    }
    .lit-badge {
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 0.74rem;
      font-weight: bold;
    }
    .beginner { background: #3a1a1a; color: #ff6b6b; }
    .intermediate { background: #3a2e1a; color: #ffd93d; }
    .expert { background: #1a3a2e; color: #6bcb77; }
    .unknown { background: #2a2a2a; color: #aaa; }

    /* Scores */
    .score-label-row {
      color: #666;
      font-size: 0.78rem;
      margin-bottom: 7px;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }
    .slabel { width: 85px; color: #aaa; font-size: 0.8rem; }
    .mini-bar {
      flex: 1;
      height: 5px;
      background: #2a2a4a;
      border-radius: 10px;
      overflow: hidden;
    }
    .mini-fill {
      height: 5px;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      border-radius: 10px;
      transition: width 0.8s;
    }
    .sval { width: 28px; color: #666; font-size: 0.78rem; text-align: right; }
    .tip-mini {
      margin-top: 8px;
      padding: 6px 9px;
      background: #1a1a3a;
      border-radius: 6px;
      border-left: 2px solid #7b61ff;
      color: #888;
      font-size: 0.79rem;
    }

    /* Typing */
    .typing {
      display: none;
      padding: 11px 15px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      color: #555;
      font-size: 0.88rem;
      align-self: flex-start;
      max-width: 760px;
      width: 100%;
      margin: 0 16px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* INPUT */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #2a2a4a;
      background: #12122a;
    }
    .input-row {
      display: flex;
      gap: 8px;
      max-width: 760px;
      margin: 0 auto;
    }
    .input-row input {
      flex: 1;
      padding: 11px 16px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 22px;
      color: #fff;
      font-size: 0.92rem;
      outline: none;
      min-width: 0;
    }
    .input-row input:focus { border-color: #7b61ff; }
    .input-row button {
      padding: 11px 18px;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      border: none;
      border-radius: 22px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.88rem;
    }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* OVERLAY for mobile sidebar */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 99;
    }
    .overlay.show { display: block; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* MOBILE */
    @media (max-width: 640px) {
      .sidebar {
        position: fixed;
        left: 0; top: 0;
        height: 100dvh;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .menu-btn { display: block; }
      .bubble.user { max-width: 90%; }
    }
  </style>
</head>
<body>

<!-- Mobile overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-top">
      <span style="font-size:1.2rem">🔍</span>
      <h2>PromptLens</h2>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <input class="search-box" id="searchBox"
      placeholder="🔍 Search chats..."
      oninput="renderList(this.value)" />
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">Real-Time Prompt Transparency</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="main-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h3 id="chatTitle">New Chat</h3>
    <span class="msg-count" id="msgCount"></span>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome-screen" id="welcomeScreen">
      <h2>PromptLens</h2>
      <p>Real-Time Prompt Transparency for Non-Technical Users</p>
      <div class="chips">
        <div class="chip" onclick="useChip(this)">What is artificial intelligence?</div>
        <div class="chip" onclick="useChip(this)">Explain machine learning simply</div>
        <div class="chip" onclick="useChip(this)">What is climate change?</div>
        <div class="chip" onclick="useChip(this)">Tell me something interesting</div>
      </div>
    </div>
  </div>

  <div class="typing" id="typing">⏳ Analyzing your prompt...</div>

  <div class="input-area">
    <div class="input-row">
      <input type="text" id="userInput"
        placeholder="Ask anything..."
        onkeydown="if(event.key==='Enter') sendMessage()" />
      <button id="sendBtn" onclick="sendMessage()">Send →</button>
    </div>
  </div>
</div>

<script>
const WEBHOOK = "https://saumyadip404.app.n8n.cloud/webhook/promptlens";
let chats = JSON.parse(localStorage.getItem('pl_chats') || '{}');
let currentId = null;
let mc = 0;

window.onload = () => {
  renderList();
  const ids = Object.keys(chats).sort((a,b) => (chats[b].updatedAt||0)-(chats[a].updatedAt||0));
  if (ids.length === 0) newChat();
  else loadChat(ids[0]);
};

function save() { localStorage.setItem('pl_chats', JSON.stringify(chats)); }
function genId() { return 'c' + Date.now(); }

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('overlay');
  s.classList.toggle('open');
  o.classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function newChat() {
  const id = genId();
  chats[id] = { id, title: 'New Chat', messages: [], history: [], createdAt: Date.now(), updatedAt: Date.now() };
  save();
  loadChat(id);
  renderList();
  closeSidebar();
}

function loadChat(id) {
  currentId = id;
  mc = 0;
  const chat = chats[id];
  document.getElementById('chatTitle').innerText = chat.title;
  document.getElementById('msgCount').innerText = chat.messages.length > 0 ? chat.messages.length + ' msgs' : '';
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  if (chat.messages.length === 0) {
    area.innerHTML = `<div class="welcome-screen" id="welcomeScreen">
      <h2>PromptLens</h2>
      <p>Real-Time Prompt Transparency for Non-Technical Users</p>
      <div class="chips">
        <div class="chip" onclick="useChip(this)">What is artificial intelligence?</div>
        <div class="chip" onclick="useChip(this)">Explain machine learning simply</div>
        <div class="chip" onclick="useChip(this)">What is climate change?</div>
        <div class="chip" onclick="useChip(this)">Tell me something interesting</div>
      </div></div>`;
  } else {
    chat.messages.forEach(m => renderMsg(m, false));
  }
  renderList();
  area.scrollTop = area.scrollHeight;
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this chat?')) return;
  delete chats[id];
  save();
  const ids = Object.keys(chats);
  if (ids.length === 0) newChat();
  else if (currentId === id) loadChat(ids.sort((a,b)=>(chats[b]?.updatedAt||0)-(chats[a]?.updatedAt||0))[0]);
  renderList();
}

function renderList(filter = '') {
  const list = document.getElementById('chatList');
  const sorted = Object.values(chats)
    .filter(c => c.title.toLowerCase().includes(filter.toLowerCase()))
    .sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));

  if (sorted.length === 0) {
    list.innerHTML = '<div style="padding:14px;color:#444;font-size:0.8rem;text-align:center">No chats found</div>';
    return;
  }

  const today = new Date().setHours(0,0,0,0);
  const yesterday = today - 86400000;
  let html = '';
  let grp = {today:false, yesterday:false, older:false};

  sorted.forEach(c => {
    const d = c.updatedAt || 0;
    if (d >= today && !grp.today) { html += `<div class="chat-group-label">Today</div>`; grp.today = true; }
    else if (d >= yesterday && d < today && !grp.yesterday) { html += `<div class="chat-group-label">Yesterday</div>`; grp.yesterday = true; }
    else if (d < yesterday && !grp.older) { html += `<div class="chat-group-label">Older</div>`; grp.older = true; }
    html += `<div class="chat-item ${c.id===currentId?'active':''}" onclick="loadChat('${c.id}')">
      <span class="chat-item-title">${c.title}</span>
      <button class="chat-del" onclick="deleteChat('${c.id}',event)">🗑</button>
    </div>`;
  });
  list.innerHTML = html;
}

function useChip(el) {
  document.getElementById('userInput').value = el.innerText;
  sendMessage();
}

function md(t) {
  return (t||'')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

function safeJ(s) {
  if (typeof s === 'object') return s;
  try { return JSON.parse(s.replace(/```json|```/g,'').trim()); } catch { return null; }
}

function toggleA(id) {
  const box = document.getElementById('abox_'+id);
  const btn = document.getElementById('abtn_'+id);
  const open = box.classList.toggle('open');
  btn.innerText = open ? '✕ Hide Analytics' : '💡 Analytics';
}

function renderMsg(msg, animate = true) {
  const area = document.getElementById('chatArea');
  const id = ++mc;
  const div = document.createElement('div');
  div.className = 'msg-group';

  if (msg.role === 'user') {
    div.innerHTML = `<div class="bubble user">${msg.content}</div>`;
  } else {
    const lit = (msg.literacy || 'UNKNOWN').toUpperCase();
    const s = safeJ(msg.scores);
    const m = safeJ(msg.mismatch);

    // Mismatch HTML — only inside analytics
    let mismatchHTML = '';
    if (m) {
      mismatchHTML = `<div class="mismatch-section">`;
      if (m.mismatch) {
        mismatchHTML += `<div class="mismatch-warn">⚠️ ${m.reason}</div>`;
        if (m.suggestion) mismatchHTML += `<div class="sugg-box">✏️ ${m.suggestion}</div>`;
      } else {
        mismatchHTML += `<div class="mismatch-ok">✅ Prompt aligns well with answer</div>`;
      }
      mismatchHTML += `</div>`;
    }

    // Scores HTML
    let scoresHTML = '';
    if (s && s.clarity !== undefined) {
      scoresHTML = `
        <div class="score-label-row">📊 Prompt Quality</div>
        <div class="score-row">
          <span class="slabel">Clarity</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${s.clarity*10}%"></div></div>
          <span class="sval">${s.clarity}/10</span>
        </div>
        <div class="score-row">
          <span class="slabel">Specificity</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${s.specificity*10}%"></div></div>
          <span class="sval">${s.specificity}/10</span>
        </div>
        <div class="score-row">
          <span class="slabel">Completeness</span>
          <div class="mini-bar"><div class="mini-fill" style="width:${s.completeness*10}%"></div></div>
          <span class="sval">${s.completeness}/10</span>
        </div>
        ${s.tip ? `<div class="tip-mini">💡 ${s.tip}</div>` : ''}`;
    }

    div.innerHTML = `
      <div class="bubble assistant">${md(msg.content)}</div>
      <button class="analytics-toggle" id="abtn_${id}"
        onclick="toggleA(${id})">💡 Analytics</button>
      <div class="analytics-box" id="abox_${id}">
        ${mismatchHTML}
        <div class="lit-row">
          Literacy Level:
          <span class="lit-badge ${lit.toLowerCase()}">${lit}</span>
        </div>
        ${scoresHTML}
      </div>`;
  }

  area.appendChild(div);
  if (animate) setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const prompt = input.value.trim();
  if (!prompt || !currentId) return;

  const chat = chats[currentId];
  const ws = document.getElementById('welcomeScreen');
  if (ws) ws.remove();

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('typing').style.display = 'block';

  const userMsg = { role: 'user', content: prompt };
  chat.messages.push(userMsg);
  renderMsg(userMsg);

  if (chat.messages.length === 1) {
    chat.title = prompt.length > 38 ? prompt.substring(0, 38) + '...' : prompt;
    document.getElementById('chatTitle').innerText = chat.title;
  }

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userPrompt: prompt,
        history: JSON.stringify(chat.history)
      })
    });

    const raw = await res.text();
    let data = JSON.parse(raw);
    if (Array.isArray(data)) data = data[0];

    const answer = data.answer || 'No answer received.';
    const litRaw = (data.literacy || '').toString();
    const litMatch = litRaw.match(/BEGINNER|INTERMEDIATE|EXPERT/i);
    const lit = litMatch ? litMatch[0].toUpperCase() : 'UNKNOWN';

    chat.history.push({ role: 'user', content: prompt });
    chat.history.push({ role: 'assistant', content: answer });
    if (chat.history.length > 10) chat.history = chat.history.slice(-10);

    const aMsg = {
      role: 'assistant',
      content: answer,
      literacy: lit,
      scores: data.scores,
      mismatch: data.mismatch
    };
    chat.messages.push(aMsg);
    chat.updatedAt = Date.now();
    save();
    renderMsg(aMsg);
    renderList();
    document.getElementById('msgCount').innerText = chat.messages.length + ' msgs';

  } catch (err) {
    const e = { role: 'assistant', content: '❌ Error: ' + err.message };
    chat.messages.push(e);
    renderMsg(e);
    save();
  } finally {
    document.getElementById('typing').style.display = 'none';
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('chatArea').scrollTop = 99999;
  }
}
</script>
</body>
</html>
