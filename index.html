<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PromptLens</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px; min-width: 260px;
      background: #12122a;
      border-right: 1px solid #2a2a4a;
      display: flex; flex-direction: column;
      height: 100dvh; z-index: 100;
      transition: transform 0.3s;
    }
    .sidebar-header { padding: 14px; border-bottom: 1px solid #2a2a4a; }
    .sidebar-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .sidebar-header h2 {
      font-size: 1rem;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .new-chat-btn {
      width: 100%; padding: 9px;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      border: none; border-radius: 8px; color: white;
      font-size: 0.85rem; cursor: pointer; font-weight: bold; margin-bottom: 8px;
    }
    .new-chat-btn:hover { opacity: 0.9; }
    .search-box {
      width: 100%; padding: 7px 11px;
      background: #1a1a2e; border: 1px solid #333;
      border-radius: 8px; color: #fff; font-size: 0.82rem; outline: none;
    }
    .search-box:focus { border-color: #7b61ff; }
    .chat-list { flex: 1; overflow-y: auto; padding: 6px; }
    .chat-group-label {
      font-size: 0.7rem; color: #555;
      padding: 8px 8px 3px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .chat-item {
      padding: 9px 10px; border-radius: 7px; cursor: pointer;
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 2px; transition: background 0.15s;
    }
    .chat-item:hover { background: #1a1a3a; }
    .chat-item.active { background: #2a2a4a; }
    .chat-item-inner { flex: 1; min-width: 0; }
    .chat-item-title {
      font-size: 0.83rem; color: #ccc;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-item-excerpt {
      font-size: 0.72rem; color: #555; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-del {
      background: none; border: none; color: #555;
      cursor: pointer; font-size: 0.85rem; padding: 2px 4px;
      display: none; flex-shrink: 0;
    }
    .chat-item:hover .chat-del { display: block; }
    .chat-del:hover { color: #ff6b6b; }
    .sidebar-footer {
      padding: 10px; border-top: 1px solid #2a2a4a;
      font-size: 0.7rem; color: #444; text-align: center;
    }

    /* ── MAIN ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      height: 100dvh; overflow: hidden; min-width: 0;
    }
    .main-header {
      padding: 11px 16px; border-bottom: 1px solid #2a2a4a;
      background: #12122a; display: flex; align-items: center; gap: 10px;
    }
    .menu-btn {
      display: none; background: none; border: none;
      color: #888; font-size: 1.2rem; cursor: pointer; padding: 4px;
    }
    .main-header h3 {
      font-size: 0.9rem; color: #888; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .msg-count { font-size: 0.75rem; color: #444; white-space: nowrap; }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .welcome-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; color: #444;
      text-align: center; gap: 10px; padding: 20px;
    }
    .welcome-screen h2 {
      font-size: 1.6rem;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome-screen p { font-size: 0.88rem; color: #555; }
    .chips {
      display: flex; flex-wrap: wrap;
      gap: 7px; justify-content: center; margin-top: 12px;
    }
    .chip {
      padding: 7px 14px; background: #1a1a2e;
      border: 1px solid #2a2a4a; border-radius: 20px;
      font-size: 0.82rem; color: #888; cursor: pointer; transition: all 0.2s;
    }
    .chip:hover { border-color: #7b61ff; color: #ccc; background: #1a1a3a; }

    /* ── MESSAGES ── */
    .msg-group {
      display: flex; flex-direction: column; gap: 5px;
      width: 100%; max-width: 760px; margin: 0 auto;
    }
    .bubble {
      padding: 12px 16px; border-radius: 16px;
      line-height: 1.7; font-size: 0.92rem; word-break: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, #7b61ff, #5a45cc);
      color: white; align-self: flex-end;
      border-bottom-right-radius: 4px; max-width: 80%;
    }
    .bubble.assistant {
      background: #1a1a2e; border: 1px solid #2a2a4a;
      color: #ccc; align-self: flex-start;
      border-bottom-left-radius: 4px; width: 100%;
    }
    .bubble.assistant strong { color: #fff; }
    .bubble.error { background: #2a1a1a; border: 1px solid #ff444433; color: #ff6b6b; }

    /* ── ANALYTICS ── */
    .analytics-toggle {
      align-self: flex-start; background: none;
      border: 1px solid #7b61ff44; color: #7b61ff;
      padding: 4px 12px; border-radius: 20px;
      cursor: pointer; font-size: 0.76rem; transition: all 0.2s;
    }
    .analytics-toggle:hover { background: #7b61ff22; border-color: #7b61ff; }
    .analytics-box {
      display: none; background: #12122a;
      border: 1px solid #2a2a4a; border-radius: 10px;
      padding: 14px; font-size: 0.82rem;
    }
    .analytics-box.open { display: block; }

    /* Why this answer */
    .explain-section {
      margin-bottom: 12px; padding-bottom: 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    .explain-label {
      color: #7b61ff; font-size: 0.78rem; margin-bottom: 6px; font-weight: bold;
    }
    .explain-text { color: #aaa; font-size: 0.82rem; line-height: 1.6; }

    /* Literacy */
    .lit-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px; color: #888; font-size: 0.82rem;
    }
    .lit-badge { padding: 4px 10px; border-radius: 10px; font-size: 0.74rem; font-weight: bold; }
    .beginner     { background: #3a1a1a; color: #ff6b6b; border: 1px solid #ff6b6b33; }
    .intermediate { background: #3a2e1a; color: #ffd93d; border: 1px solid #ffd93d33; }
    .expert       { background: #1a3a2e; color: #6bcb77; border: 1px solid #6bcb7733; }
    .unknown      { background: #2a2a2a; color: #aaa; }
    .lit-hint { font-size: 0.73rem; color: #555; margin-bottom: 10px; padding-left: 2px; }

    /* Scores */
    .score-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .score-header-label { color: #666; font-size: 0.78rem; font-weight: bold; }
    .score-avg-badge { font-size: 0.78rem; font-weight: bold; padding: 2px 8px; border-radius: 10px; }
    .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .slabel { width: 90px; color: #aaa; font-size: 0.8rem; }
    .mini-bar { flex: 1; height: 6px; background: #2a2a4a; border-radius: 10px; overflow: hidden; }
    .mini-fill { height: 6px; border-radius: 10px; transition: width 0.8s ease; }
    .fill-low  { background: linear-gradient(90deg, #ff6b6b, #ff9999); }
    .fill-mid  { background: linear-gradient(90deg, #ffd93d, #ffee99); }
    .fill-high { background: linear-gradient(90deg, #7b61ff, #00d4ff); }
    .sval { width: 32px; color: #666; font-size: 0.78rem; text-align: right; }
    .tip-mini {
      margin-top: 10px; padding: 7px 10px; background: #1a1a3a;
      border-radius: 6px; border-left: 2px solid #7b61ff;
      color: #888; font-size: 0.79rem; line-height: 1.5;
    }

    /* Suggestions */
    .suggestions-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a2a4a; }
    .suggestions-label { color: #888; font-size: 0.78rem; margin-bottom: 3px; }
    .suggestions-sublabel { font-size: 0.72rem; color: #555; margin-bottom: 8px; font-style: italic; }
    .suggestion-pill {
      display: block; width: 100%; padding: 9px 14px; margin-bottom: 6px;
      background: #1a1a3a; border: 1px solid #7b61ff44;
      border-radius: 8px; color: #bbb; font-size: 0.82rem;
      cursor: pointer; text-align: left; transition: all 0.2s;
      line-height: 1.5; user-select: text;
    }
    .suggestion-pill:hover {
      border-color: #7b61ff; color: #fff;
      background: #252550; transform: translateX(3px);
    }
    .suggestion-pill::before { content: '→ '; color: #7b61ff; font-weight: bold; }

    /* Typing */
    .typing {
      display: none; padding: 11px 15px; background: #1a1a2e;
      border: 1px solid #2a2a4a; border-radius: 16px;
      border-bottom-left-radius: 4px; color: #555; font-size: 0.88rem;
      max-width: 760px; width: 100%; margin: 0 auto;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Input */
    .input-area { padding: 12px 16px; border-top: 1px solid #2a2a4a; background: #12122a; }
    .input-row { display: flex; gap: 8px; max-width: 760px; margin: 0 auto; }
    .input-row input {
      flex: 1; padding: 11px 16px; background: #1a1a2e;
      border: 1px solid #333; border-radius: 22px;
      color: #fff; font-size: 0.92rem; outline: none; min-width: 0;
    }
    .input-row input:focus { border-color: #7b61ff; }
    .input-row button {
      padding: 11px 20px;
      background: linear-gradient(90deg, #7b61ff, #00d4ff);
      border: none; border-radius: 22px; color: white;
      font-weight: bold; cursor: pointer; font-size: 0.88rem; white-space: nowrap;
    }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Mobile overlay */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 99;
    }
    .overlay.show { display: block; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .sidebar {
        position: fixed; left: 0; top: 0;
        height: 100dvh; transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: block; }
      .bubble.user { max-width: 90%; }
    }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-top">
      <span style="font-size:1.2rem">🔍</span>
      <h2>PromptLens</h2>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    <input class="search-box" id="searchBox"
      placeholder="🔍 Search messages..."
      oninput="renderList(this.value)" />
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">Real-Time Prompt Transparency</div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="main-header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <h3 id="chatTitle">New Chat</h3>
    <span class="msg-count" id="msgCount"></span>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="welcome-screen" id="welcomeScreen">
      <h2>PromptLens</h2>
      <p>Real-Time Prompt Transparency for Non-Technical Users</p>
      <div class="chips">
        <div class="chip" onclick="useChip(this)">What is artificial intelligence?</div>
        <div class="chip" onclick="useChip(this)">Explain machine learning simply</div>
        <div class="chip" onclick="useChip(this)">What is climate change?</div>
        <div class="chip" onclick="useChip(this)">Tell me something interesting</div>
      </div>
    </div>
  </div>
  <div class="typing" id="typing">⏳ Analyzing your prompt...</div>
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="userInput"
        placeholder="Ask anything..."
        onkeydown="if(event.key==='Enter') sendMessage()" />
      <button id="sendBtn" onclick="sendMessage()">Send →</button>
    </div>
  </div>
</div>

<script>
const WEBHOOK = "https://sarjinkhan2003.app.n8n.cloud/webhook/promptlens";

// Suggestion store avoids quote-escaping issues in onclick
const suggestionStore = {};

// Short/greeting prompts — no analytics shown
const SHORT_PROMPTS = [
  'hi','hello','hey','hiya','yo','sup','greetings',
  'ok','okay','k','yes','no','yeah','nope','yep',
  'umm','um','uh','hmm','hm','ah','oh','lol',
  'haha','hehe','thanks','thank you','ty','bye',
  'goodbye','cya','later','sure','alright','fine',
  'cool','nice','great','good','bad','wow','omg'
];

function isShortOrGreeting(prompt) {
  if (!prompt) return true;
  const p = prompt.toLowerCase().trim();
  const words = p.split(/\s+/);
  // Single word always short
  if (words.length === 1) return true;
  // 2 words — check if it's greeting-like
  if (words.length === 2 && SHORT_PROMPTS.some(s => p.includes(s))) return true;
  // Very short (under 8 chars)
  if (p.length < 8) return true;
  return false;
}

// Load chats
let chats = {};
try { chats = JSON.parse(localStorage.getItem('pl_chats5') || '{}'); } catch(e) { chats = {}; }
let currentId = null;
let mc = 0;

// ── INIT ──
window.onload = () => {
  renderList();
  const ids = Object.keys(chats).sort(
    (a,b) => (chats[b]?.updatedAt||0) - (chats[a]?.updatedAt||0)
  );
  if (ids.length === 0) newChat();
  else loadChat(ids[0]);
};

function save() {
  try { localStorage.setItem('pl_chats5', JSON.stringify(chats)); } catch(e) {}
}
function genId() { return 'c' + Date.now() + Math.random().toString(36).slice(2,6); }

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── CHAT MANAGEMENT ──
function newChat() {
  const id = genId();
  chats[id] = {
    id, title: 'New Chat', messages: [], history: [],
    createdAt: Date.now(), updatedAt: Date.now()
  };
  save(); loadChat(id); renderList(); closeSidebar();
}

function loadChat(id) {
  currentId = id; mc = 0;
  const chat = chats[id];
  if (!chat) { newChat(); return; }
  document.getElementById('chatTitle').innerText = chat.title;
  document.getElementById('msgCount').innerText =
    chat.messages.length > 0 ? chat.messages.length + ' msgs' : '';
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  if (chat.messages.length === 0) area.innerHTML = welcomeHTML();
  else chat.messages.forEach(m => renderMsg(m, false));
  renderList();
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
  closeSidebar();
}

function deleteChat(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this chat?')) return;
  delete chats[id]; save();
  const ids = Object.keys(chats);
  if (ids.length === 0) newChat();
  else if (currentId === id) {
    loadChat(ids.sort((a,b)=>(chats[b]?.updatedAt||0)-(chats[a]?.updatedAt||0))[0]);
  }
  renderList();
}

// ── CONTEXT-BASED SEARCH ──
function renderList(filter = '') {
  const list = document.getElementById('chatList');
  let sorted = Object.values(chats)
    .sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));

  const q = (filter||'').toLowerCase().trim();
  if (q) {
    sorted = sorted.filter(c => {
      if (c.title.toLowerCase().includes(q)) return true;
      return c.messages.some(m => m.content && m.content.toLowerCase().includes(q));
    });
  }

  if (sorted.length === 0) {
    list.innerHTML = '<div style="padding:14px;color:#444;font-size:0.8rem;text-align:center">No results found</div>';
    return;
  }

  const today = new Date().setHours(0,0,0,0);
  const yesterday = today - 86400000;
  let html = ''; let grp = {t:false,y:false,o:false};

  sorted.forEach(c => {
    const d = c.updatedAt || 0;
    if (d >= today && !grp.t) { html += `<div class="chat-group-label">Today</div>`; grp.t=true; }
    else if (d >= yesterday && d < today && !grp.y) { html += `<div class="chat-group-label">Yesterday</div>`; grp.y=true; }
    else if (d < yesterday && !grp.o) { html += `<div class="chat-group-label">Older</div>`; grp.o=true; }

    let excerpt = '';
    if (q) {
      const matchMsg = c.messages.find(m => m.content && m.content.toLowerCase().includes(q));
      if (matchMsg) {
        const idx = matchMsg.content.toLowerCase().indexOf(q);
        const start = Math.max(0, idx-20);
        excerpt = `<div class="chat-item-excerpt">...${matchMsg.content.substring(start, start+55).replace(/\n/g,' ')}...</div>`;
      }
    }

    html += `<div class="chat-item ${c.id===currentId?'active':''}" onclick="loadChat('${c.id}')">
      <div class="chat-item-inner">
        <div class="chat-item-title">${esc(c.title)}</div>${excerpt}
      </div>
      <button class="chat-del" onclick="deleteChat('${c.id}',event)">🗑</button>
    </div>`;
  });
  list.innerHTML = html;
}

// ── HELPERS ──
function esc(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function md(t) {
  return (t||'')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}
function safeJ(s) {
  if (typeof s==='object' && s!==null) return s;
  try { return JSON.parse((s||'').replace(/```json|```/g,'').trim()); }
  catch { return null; }
}

// ── LITERACY — derived from scores for consistency ──
function deriveLiteracy(scores, rawLit) {
  // Priority 1: literacy field inside scores JSON
  if (scores && scores.literacy) {
    const m = scores.literacy.match(/BEGINNER|INTERMEDIATE|EXPERT/i);
    if (m) return m[0].toUpperCase();
  }
  // Priority 2: derive from average score
  if (scores && scores.clarity !== undefined) {
    const avg = (scores.clarity + scores.specificity + scores.completeness) / 3;
    if (avg < 5)   return 'BEGINNER';
    if (avg < 7.5) return 'INTERMEDIATE';
    return 'EXPERT';
  }
  // Priority 3: raw string
  if (rawLit) {
    const m = rawLit.toString().match(/BEGINNER|INTERMEDIATE|EXPERT/i);
    if (m) return m[0].toUpperCase();
  }
  return 'UNKNOWN';
}

function litClass(l) {
  if (!l) return 'unknown';
  if (l.includes('BEGINNER'))     return 'beginner';
  if (l.includes('INTERMEDIATE')) return 'intermediate';
  if (l.includes('EXPERT'))       return 'expert';
  return 'unknown';
}

function litHint(l) {
  if (l==='BEGINNER')     return '💡 Your prompt is simple — see suggestions below to improve it';
  if (l==='INTERMEDIATE') return '💡 Good prompt! A little more context would give better results';
  if (l==='EXPERT')       return '💡 Excellent prompt with strong technical depth';
  return '';
}

function fillClass(n) {
  if (n <= 3) return 'fill-low';
  if (n <= 6) return 'fill-mid';
  return 'fill-high';
}

function suggSubLabel(lit) {
  if (lit==='BEGINNER')     return 'Simpler, clearer versions tailored for you:';
  if (lit==='INTERMEDIATE') return 'More specific versions to get better results:';
  if (lit==='EXPERT')       return 'Advanced variations to deepen your query:';
  return 'Try these improved versions:';
}

// ── SUGGESTION HANDLER ──
function useSuggestion(storeKey, idx) {
  const list = suggestionStore[storeKey];
  if (!list || list[idx]===undefined) return;
  const input = document.getElementById('userInput');
  input.value = list[idx];
  input.focus();
  setTimeout(() => sendMessage(), 100);
}

function useChip(el) {
  document.getElementById('userInput').value = el.innerText;
  sendMessage();
}

function toggleA(id) {
  const box = document.getElementById('abox_'+id);
  const btn = document.getElementById('abtn_'+id);
  if (!box||!btn) return;
  const open = box.classList.toggle('open');
  btn.innerText = open ? '✕ Hide Analytics' : '💡 Analytics';
}

function welcomeHTML() {
  return `<div class="welcome-screen" id="welcomeScreen">
    <h2>PromptLens</h2>
    <p>Real-Time Prompt Transparency for Non-Technical Users</p>
    <div class="chips">
      <div class="chip" onclick="useChip(this)">What is artificial intelligence?</div>
      <div class="chip" onclick="useChip(this)">Explain machine learning simply</div>
      <div class="chip" onclick="useChip(this)">What is climate change?</div>
      <div class="chip" onclick="useChip(this)">Tell me something interesting</div>
    </div>
  </div>`;
}

// ── RENDER MESSAGE ──
function renderMsg(msg, animate=true) {
  const area = document.getElementById('chatArea');
  const id = ++mc;
  const div = document.createElement('div');
  div.className = 'msg-group';

  if (msg.role === 'user') {
    div.innerHTML = `<div class="bubble user">${md(msg.content)}</div>`;

  } else if (msg.role === 'error') {
    div.innerHTML = `<div class="bubble error">${esc(msg.content)}</div>`;

  } else {
    const s    = safeJ(msg.scores);
    const sugg = safeJ(msg.suggestions);
    const expl = (msg.explanation || '').trim();
    const lit  = deriveLiteracy(s, msg.literacy);
    const lc   = litClass(lit);
    const lh   = litHint(lit);

    // Don't show analytics for short/greeting prompts
    const hideAnalytics = msg.isShortPrompt === true;

    // Average score
    let avgScore = null; let avgColor = '#aaa';
    if (s && s.clarity !== undefined) {
      avgScore = ((s.clarity + s.specificity + s.completeness) / 3).toFixed(1);
      avgColor = avgScore < 5 ? '#ff6b6b' : avgScore < 7.5 ? '#ffd93d' : '#6bcb77';
    }

    // Why this answer — only show if meaningful
    let explHTML = '';
    if (expl && !hideAnalytics) {
      explHTML = `
        <div class="explain-section">
          <div class="explain-label">🔍 Why this answer?</div>
          <div class="explain-text">${md(expl)}</div>
        </div>`;
    }

    // Scores
    let scoresHTML = '';
    if (s && s.clarity !== undefined && !hideAnalytics) {
      scoresHTML = `
        <div class="score-header">
          <span class="score-header-label">📊 Prompt Quality Score</span>
          <span class="score-avg-badge" style="color:${avgColor};background:${avgColor}22">
            Avg ${avgScore}/10
          </span>
        </div>
        <div class="score-row">
          <span class="slabel">Clarity</span>
          <div class="mini-bar"><div class="mini-fill ${fillClass(s.clarity)}" style="width:${s.clarity*10}%"></div></div>
          <span class="sval">${s.clarity}/10</span>
        </div>
        <div class="score-row">
          <span class="slabel">Specificity</span>
          <div class="mini-bar"><div class="mini-fill ${fillClass(s.specificity)}" style="width:${s.specificity*10}%"></div></div>
          <span class="sval">${s.specificity}/10</span>
        </div>
        <div class="score-row">
          <span class="slabel">Completeness</span>
          <div class="mini-bar"><div class="mini-fill ${fillClass(s.completeness)}" style="width:${s.completeness*10}%"></div></div>
          <span class="sval">${s.completeness}/10</span>
        </div>
        ${s.tip ? `<div class="tip-mini">💡 ${esc(s.tip)}</div>` : ''}`;
    }

    // Suggestions
    let suggHTML = '';
    if (sugg && Array.isArray(sugg.suggestions) && sugg.suggestions.length > 0 && !hideAnalytics) {
      const storeKey = (currentId||'c') + '_' + id;
      suggestionStore[storeKey] = sugg.suggestions;
      const pills = sugg.suggestions.map((s,idx) =>
        `<button class="suggestion-pill"
          onclick="useSuggestion('${storeKey}',${idx})"
          title="Click to send this prompt">${esc(s)}</button>`
      ).join('');
      suggHTML = `
        <div class="suggestions-section">
          <div class="suggestions-label">✨ Try these better prompts:</div>
          <div class="suggestions-sublabel">${suggSubLabel(lit)}</div>
          ${pills}
        </div>`;
    }

    // Analytics section — hidden for short prompts
    const analyticsHTML = hideAnalytics ? '' : `
      <button class="analytics-toggle" id="abtn_${id}"
        onclick="toggleA(${id})">💡 Analytics</button>
      <div class="analytics-box" id="abox_${id}">
        ${explHTML}
        <div class="lit-row">
          Literacy Level: <span class="lit-badge ${lc}">${lit}</span>
        </div>
        ${lh ? `<div class="lit-hint">${lh}</div>` : ''}
        ${scoresHTML}
        ${suggHTML}
      </div>`;

    div.innerHTML = `
      <div class="bubble assistant">${md(msg.content)}</div>
      ${analyticsHTML}`;
  }

  area.appendChild(div);
  if (animate) setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('userInput');
  const prompt = input.value.trim();
  if (!prompt || !currentId) return;

  const chat = chats[currentId];
  if (!chat) return;

  const ws = document.getElementById('welcomeScreen');
  if (ws) ws.remove();

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('typing').style.display = 'block';

  const userMsg = { role: 'user', content: prompt };
  chat.messages.push(userMsg);
  renderMsg(userMsg);

  // Auto-title from first user message
  if (chat.messages.filter(m=>m.role==='user').length === 1) {
    chat.title = prompt.length > 40 ? prompt.substring(0,40)+'...' : prompt;
    document.getElementById('chatTitle').innerText = chat.title;
  }

  // Detect if this is a short/greeting prompt
  const shortPrompt = isShortOrGreeting(prompt);

  try {
    const res = await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userPrompt: prompt,
        history: JSON.stringify(chat.history)
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rawText = await res.text();
    if (!rawText || !rawText.trim()) throw new Error('Empty response from n8n');

    let data = JSON.parse(rawText);
    if (Array.isArray(data)) data = data[0];

    const answer = data.answer || 'No answer received.';
    const scoresObj = safeJ(data.scores);
    const consistentLit = deriveLiteracy(scoresObj, data.literacy || '');

    // Update history
    chat.history.push({ role: 'user', content: prompt });
    chat.history.push({ role: 'assistant', content: answer });
    if (chat.history.length > 10) chat.history = chat.history.slice(-10);

    const aMsg = {
      role: 'assistant',
      content: answer,
      literacy: consistentLit,
      explanation: data.explanation || '',
      scores: data.scores,
      suggestions: data.suggestions,
      isShortPrompt: shortPrompt   // flag to hide analytics
    };

    chat.messages.push(aMsg);
    chat.updatedAt = Date.now();
    save();
    renderMsg(aMsg);
    renderList(document.getElementById('searchBox').value);
    document.getElementById('msgCount').innerText = chat.messages.length + ' msgs';

  } catch(err) {
    console.error('PromptLens error:', err);
    const errMsg = {
      role: 'error',
      content: `❌ ${err.message}. Make sure the n8n workflow is published and running.`
    };
    chat.messages.push({ role: 'assistant', content: errMsg.content });
    renderMsg(errMsg);
    save();
  } finally {
    document.getElementById('typing').style.display = 'none';
    document.getElementById('sendBtn').disabled = false;
    setTimeout(() => {
      document.getElementById('chatArea').scrollTop = 999999;
    }, 100);
  }
}
</script>
